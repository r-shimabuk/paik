
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シマブク（パピー）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F6F7F8;--win:#EDEDEC;--bar:#E2E2E0;
  --ink:#1A1A1A;--muted:#888;--dim:rgba(26,26,26,.11);
  --accent:#E83D22;
  --en:'Barlow Condensed','Arial Narrow',sans-serif;
  --jp:'Noto Sans JP',sans-serif;
  --hh:44px;--fh:44px;
}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:#F6F7F8;
  background-image:radial-gradient(circle,rgba(232,61,34,.22) 1.4px,transparent 1.4px);
  background-size:22px 22px;
  font-family:var(--en);color:var(--ink);user-select:none;
}

/* HEADER */
.site-header{
  position:fixed;top:0;left:0;right:0;height:var(--hh);
  background:var(--accent);z-index:9000;
  display:flex;align-items:center;padding:0 24px;justify-content:space-between;
}
.header-title{font-family:var(--jp);font-size:12px;font-weight:300;letter-spacing:.15em;color:#fff;cursor:pointer;}
.header-title span{font-family:var(--en);letter-spacing:.22em;font-weight:400;}
.header-nav{display:flex;gap:28px;}
.header-nav a{font-family:var(--en);font-size:10px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:#fff;text-decoration:none;opacity:.85;cursor:pointer;}
.header-nav a:hover{opacity:1;}

/* FOOTER */
.site-footer{
  position:fixed;bottom:0;left:0;right:0;height:var(--fh);
  background:var(--accent);z-index:9000;
  display:flex;align-items:center;padding:0 24px;justify-content:space-between;
}
.footer-copy{font-family:var(--en);font-size:9px;font-weight:300;letter-spacing:.15em;color:rgba(255,255,255,.75);text-transform:uppercase;}
.footer-shuffle{
  font-family:var(--en);font-size:9px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;
  color:#fff;border:.5px solid rgba(255,255,255,.6);padding:7px 18px;cursor:pointer;background:none;
}
.footer-shuffle:hover{background:rgba(255,255,255,.15);}

/* ── WINDOW ── */
.win{
  position:fixed;
  background:var(--win);
  border:.5px solid var(--ink);
  z-index:10;
}
.win.closed{display:none;}

.win-accent{height:2px;background:var(--accent);}

.win-bar{
  padding:7px 12px;
  border-bottom:.5px solid var(--ink);
  background:var(--bar);
  display:flex;align-items:center;justify-content:space-between;
  cursor:grab;
  -webkit-user-select:none;user-select:none;
}
.win-bar:active{cursor:grabbing;}

.win-label{
  font-family:var(--en);font-size:8px;font-weight:300;
  letter-spacing:.22em;color:var(--muted);text-transform:uppercase;
  pointer-events:none;
}

.win-close{
  width:16px;height:16px;border:.5px solid var(--ink);background:none;
  cursor:pointer;font-size:10px;color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  line-height:1;flex-shrink:0;
}
.win-close:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

.win-body{padding:22px 24px;}

/* LOGO window */
.logo-win-inner{
  padding:0;
  background:var(--bg);
}
.logo-win-inner svg{display:block;width:100%;height:auto;}

/* ABOUT MODAL */
.modal-overlay{position:fixed;inset:0;z-index:9500;background:rgba(26,26,26,.5);display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--win);border:.5px solid var(--ink);width:min(520px,90vw);max-height:82vh;overflow-y:auto;}
.modal-accent{height:2px;background:var(--accent);}
.modal-bar{padding:8px 14px;border-bottom:.5px solid var(--ink);background:var(--bar);display:flex;align-items:center;justify-content:space-between;}
.modal-lbl{font-family:var(--en);font-size:8px;font-weight:300;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;}
.modal-x{width:18px;height:18px;border:.5px solid var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--ink);}
.modal-x:hover{background:var(--ink);color:var(--win);}
.modal-body{padding:28px 30px;}
.about-name{font-family:var(--en);font-size:32px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;line-height:1;margin-bottom:4px;}
.about-sub{font-family:var(--jp);font-size:11px;font-weight:300;letter-spacing:.18em;color:var(--muted);margin-bottom:10px;}
.about-handle{display:inline-block;font-family:var(--en);font-size:8px;letter-spacing:.15em;text-transform:uppercase;background:var(--ink);color:var(--accent);padding:2px 9px;margin-bottom:18px;}
.about-bio{font-family:var(--jp);font-size:12px;font-weight:300;line-height:2.1;color:#444;margin-bottom:20px;}
.about-tags{display:flex;flex-wrap:wrap;gap:5px;}
.about-tag{font-family:var(--en);font-size:8px;letter-spacing:.12em;text-transform:uppercase;border:.5px solid var(--ink);padding:2px 9px;}

/* rows — podcast / music */
.row{display:flex;align-items:baseline;gap:12px;padding:9px 0;border-bottom:.5px solid var(--dim);font-family:var(--en);font-size:16px;font-weight:300;cursor:pointer;}
.row:last-of-type{border-bottom:none;}
.row:hover{opacity:.45;}
.row.on .row-t{border-bottom:2px solid var(--accent);}
.row-n{font-size:8px;color:var(--muted);min-width:30px;flex-shrink:0;letter-spacing:.08em;}
.row-t{flex:1;}
.row-s{font-size:8px;color:var(--muted);flex-shrink:0;}
.row-g{font-size:8px;color:var(--muted);flex-shrink:0;margin-right:8px;}

/* mini player */
.player{margin-top:12px;border-top:.5px solid var(--dim);padding-top:12px;display:flex;align-items:center;gap:12px;}
.pbtn{width:28px;height:28px;border:.5px solid var(--ink);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.pbtn:hover{background:var(--accent);border-color:var(--accent);}
.pbtn svg{width:11px;height:11px;fill:var(--ink);display:block;}
.ptrack{flex:1;min-width:0;}
.pnow{font-family:var(--en);font-size:9px;color:var(--muted);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pbar{height:1px;background:var(--dim);position:relative;}
.pfill{position:absolute;top:0;left:0;height:100%;background:var(--accent);}
.pdur{font-family:var(--en);font-size:9px;color:var(--muted);flex-shrink:0;}

/* work card */
.img-ph{width:100%;aspect-ratio:3/2;background:#D8D8D8;display:flex;align-items:center;justify-content:center;font-family:var(--en);font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.work-cat{font-family:var(--en);font-size:8px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.work-title{font-family:var(--jp);font-size:15px;font-weight:300;line-height:1.5;margin-bottom:5px;}
.work-date{font-family:var(--en);font-size:8px;color:var(--muted);margin-bottom:10px;}
.work-link{font-family:var(--en);font-size:8px;letter-spacing:.12em;text-transform:uppercase;border:.5px solid var(--ink);padding:4px 12px;cursor:pointer;background:none;color:var(--ink);}
.work-link:hover{background:var(--ink);color:var(--win);}

/* cone window */
.cone-inner{padding:16px;display:flex;align-items:center;justify-content:center;background:var(--win);}
.cone-inner svg{display:block;width:100%;height:auto;}

.loading{font-family:var(--en);font-size:8px;color:var(--muted);letter-spacing:.12em;padding:14px 0;text-align:center;}
</style>
</head>

<script>
// ── Google Sheets URLs ──────────────────────
const SHEETS = {
  about:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=1400416584&single=true&output=csv',
  works:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=2026004957&single=true&output=csv',
  podcast: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=266309937&single=true&output=csv',
  music:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=402396762&single=true&output=csv',
  contact: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=789321669&single=true&output=csv',
};

const HH = 44, FH = 44;
let zTop = 100;
let allIds = []; // 全ウィンドウID（シャッフル対象）

// ── CLAMP ────────────────────────────────────
function cx(x, w){ return Math.max(0, Math.min(x, window.innerWidth - (w||0) - 2)); }
function cy(y, h){ return Math.max(HH, Math.min(y, window.innerHeight - FH - 32)); }

// ── BRING TO FRONT ───────────────────────────
function bringTop(id){
  const el = document.getElementById(id);
  if(el){ zTop++; el.style.zIndex = zTop; }
}

// ── CLOSE / OPEN ─────────────────────────────
function closeWin(id){
  const el = document.getElementById(id);
  if(el) el.classList.add('closed');
}
function openWin(id){
  const el = document.getElementById(id);
  if(el) el.classList.remove('closed');
}

// ── PLACE WINDOW ─────────────────────────────
function placeWin(id, x, y, w, h){
  const el = document.getElementById(id);
  if(!el) return;
  if(w) el.style.width = w + 'px';
  if(h) el.style.height = h + 'px';
  // クリックで最前面
  el.addEventListener('mousedown',  () => bringTop(id));
  el.addEventListener('touchstart', () => bringTop(id), {passive:true});
  // バーをドラッグハンドルに
  const bar = el.querySelector('.win-bar');
  if(bar){
    bar.addEventListener('mousedown',  e => startDrag(e, id));
    bar.addEventListener('touchstart', e => startTouch(e, id), {passive:false});
  }
  // 初期位置
  setTimeout(()=>{
    const ew = el.offsetWidth  || w || 300;
    const eh = el.offsetHeight || h || 200;
    el.style.left = cx(x, ew) + 'px';
    el.style.top  = cy(y, eh) + 'px';
  }, 0);
  if(!allIds.includes(id)) allIds.push(id);
}

// ── DRAG: MOUSE ──────────────────────────────
let dragEl = null, ox = 0, oy = 0;

function startDrag(e, id){
  if(e.button !== 0) return;
  dragEl = document.getElementById(id);
  bringTop(id);
  const r = dragEl.getBoundingClientRect();
  ox = e.clientX - r.left;
  oy = e.clientY - r.top;
  e.preventDefault();
}

document.addEventListener('mousemove', e => {
  if(!dragEl) return;
  dragEl.style.left = cx(e.clientX - ox, dragEl.offsetWidth)  + 'px';
  dragEl.style.top  = cy(e.clientY - oy, dragEl.offsetHeight) + 'px';
});
document.addEventListener('mouseup', () => dragEl = null);

// ── DRAG: TOUCH (スマホ) ─────────────────────
let touchEl = null, ttx = 0, tty = 0;

function startTouch(e, id){
  touchEl = document.getElementById(id);
  bringTop(id);
  const t = e.touches[0];
  const r = touchEl.getBoundingClientRect();
  ttx = t.clientX - r.left;
  tty = t.clientY - r.top;
  e.preventDefault();
}

document.addEventListener('touchmove', e => {
  if(!touchEl) return;
  const t = e.touches[0];
  touchEl.style.left = cx(t.clientX - ttx, touchEl.offsetWidth)  + 'px';
  touchEl.style.top  = cy(t.clientY - tty, touchEl.offsetHeight) + 'px';
  e.preventDefault();
}, {passive: false});

document.addEventListener('touchend', () => touchEl = null);

// ── SHUFFLE ───────────────────────────────────
function doShuffle(){
  // 閉じたウィンドウを全部復活
  allIds.forEach(id => openWin(id));
  // z-index をランダムに入れ替え
  const zs = allIds.map(id => parseInt(document.getElementById(id)?.style.zIndex||10));
  for(let i = zs.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [zs[i],zs[j]] = [zs[j],zs[i]];
  }
  allIds.forEach((id,i) => {
    const el = document.getElementById(id);
    if(el) el.style.zIndex = zs[i];
  });
}

// ── LAYOUT ───────────────────────────────────
function layoutAll(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const avail = vh - HH - FH;

  // ウィンドウ幅: 画面の55% (1〜2枚しか見えない大きさ)
  const wLarge  = Math.round(vw * 0.55); // メインウィンドウ
  const wMedium = Math.round(vw * 0.48); // やや小さめ
  const wCone   = Math.round(vw * 0.28); // コーンは縦長なので細め

  // 2列ベースで少しずらして重ねる
  const col0x = Math.round(vw * 0.03);
  const col1x = Math.round(vw * 0.38);

  const fixed = [
    {id:'w-logo',    w:wLarge,  x:col0x,              y:Math.round(HH + avail*0.04)},
    {id:'w-podcast', w:wMedium, x:col1x,              y:Math.round(HH + avail*0.06)},
    {id:'w-music',   w:wMedium, x:col0x + 30,         y:Math.round(HH + avail*0.08)},
    {id:'w-cone',    w:wCone,   x:Math.round(vw*0.65),y:Math.round(HH + avail*0.05)},
  ];

  fixed.forEach((f, i) => {
    placeWin(f.id, f.x, f.y, f.w, 0);

// ── WORKS ウィンドウ生成 ──────────────────────
function buildWorkWins(works){
  const container = document.getElementById('works-container');
  container.innerHTML = '';
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const avail = vh - HH - FH;
  // Worksウィンドウ幅: 画面の50% (ビジュアル系は大きく)
  const ww = Math.round(vw * 0.50);

  // 2列・少しずつずらして新しい順に上に重なる配置
  const col0x = Math.round(vw * 0.03);
  const col1x = Math.round(vw * 0.40);

  works.forEach((w, i) => {
    const id = `w-work-${i}`;
    const el = document.createElement('div');
    el.className = 'win';
    el.id = id;
    // コンテンツエリア: YouTube埋め込み → 画像 → プレースホルダーの優先順
    const isYouTubeEmbed = embedUrl && (embedUrl.includes('youtube.com/embed') || embedUrl.includes('youtu.be'));
    const isImageUrl = (url) => url && (
      url.match(/\.(jpg|jpeg|png|gif|webp|svg|png)(\?|$)/i) ||
      url.includes('raw.githubusercontent.com') ||
      url.includes('drive.google.com/uc') ||
      url.includes('googleusercontent.com') ||
      url.includes('imgur.com') ||
      url.includes('cloudinary.com')
    );

    const mediaHTML = isYouTubeEmbed
      ? `<div style="position:relative;width:100%;padding-top:56.25%;background:#000;">
           <iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
         </div>`
      : isImageUrl(imgUrl)
        ? `<img src="${imgUrl}" style="display:block;width:100%;height:auto;" alt="${w.title||''}">`
        : isImageUrl(embedUrl)
          ? `<img src="${embedUrl}" style="display:block;width:100%;height:auto;" alt="${w.title||''}">`
          : `<div class="img-ph">Image</div>`;

    // リンクボタン: Spotifyはロゴ付き、それ以外は「Open →」
    let linkHTML = '';
    if(imgUrl){
      const isSpotify = imgUrl.includes('spotify.com');
      const isYouTube = imgUrl.includes('youtube.com') || imgUrl.includes('youtu.be');
      if(isSpotify){
        linkHTML = `<a href="${imgUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-family:var(--en);font-size:8px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--ink);padding:4px 12px;color:var(--ink);text-decoration:none;margin-top:8px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          Spotify
        </a>`;
      } else if(isYouTube && !embedUrl){
        linkHTML = `<a href="${imgUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-family:var(--en);font-size:8px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid var(--ink);padding:4px 12px;color:var(--ink);text-decoration:none;margin-top:8px;">YouTube →</a>`;
      } else if(!isImageUrl(imgUrl)){
        linkHTML = `<a href="${imgUrl}" target="_blank" style="font-family:var(--en);font-size:8px;letter-spacing:.12em;text-transform:uppercase;border:.5px solid var(--ink);padding:4px 12px;color:var(--ink);text-decoration:none;display:inline-block;margin-top:8px;">Open →</a>`;
      }
    }

    el.innerHTML = `
      <div class="win-accent"></div>
      <div class="win-bar">
        <span class="win-label">${w.category||'Work'} / ${w.date||''}</span>
        <button class="win-close" onclick="closeWin('${id}')">×</button>
      </div>
      ${mediaHTML}
      <div class="win-body" style="padding:12px 14px 14px;">
        <div class="work-cat">${w.category||''}</div>
        <div class="work-title">${w.title||''}</div>
        <div class="work-date">${w.date||''}</div>
        ${linkHTML}
      </div>`;
    container.appendChild(el);

    // raw.githubusercontent.com のURLをそのまま使う（最も確実）
    const normalizeUrl = (url) => {
      if(!url) return url;
      // GitHub blob URLをraw URLに変換
      if(url.includes('github.com') && url.includes('/blob/'))
        return url.replace('github.com','raw.githubusercontent.com').replace('/blob/','/' );
      return url;
    };
    const imgUrl = normalizeUrl(w.url);
    const embedUrl = normalizeUrl(w.embed_url);
    el.style.zIndex = baseZ;

    // 2列で交互に、少しずつ下にずらして重ねる
    const isLeft = i % 2 === 0;
    const jx = (Math.random()-0.5) * Math.round(vw*0.04);
    const jy = (Math.random()-0.5) * Math.round(avail*0.04);
    const x = (isLeft ? col0x : col1x) + jx;
    const y = Math.round(HH + avail*0.10 + Math.floor(i/2) * Math.round(avail*0.06)) + jy;

    placeWin(id, x, y, ww, 0);
    el.style.zIndex = baseZ;
  });
}

// ── CSV ──────────────────────────────────────
function parseCSV(text){
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(let c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}

async function fetchSheet(key){
  const url=SHEETS[key];
  if(!url||url.startsWith('YOUR_')) return null;
  try{ const r=await fetch(url); return parseCSV(await r.text()); }
  catch(e){ return null; }
}

// ── PLAY/PAUSE ───────────────────────────────
const timers = {};
function togglePlay(btn, fillId){
  const on = btn.dataset.on === '1';
  if(on){
    btn.dataset.on='0';
    btn.querySelector('svg').innerHTML='<path d="M8 5v14l11-7z"/>';
    clearInterval(timers[fillId]);
  }else{
    btn.dataset.on='1';
    btn.querySelector('svg').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    const fill=document.getElementById(fillId);
    let w=parseFloat(fill.style.width)||0;
    timers[fillId]=setInterval(()=>{w=(w+.05)%100;fill.style.width=w+'%';},80);
  }
}
