<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<title>シマブク（パピー）</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F6F7F8;--win:#EDEDEC;
  --ink:#1A1A1A;--muted:#888;--dim:rgba(26,26,26,.11);
  --accent:#FF4C00;
  --blue:#0000CC;
  --green:#1ED760;
  --en:'Barlow Condensed','Arial Narrow',sans-serif;
  --jp:'Noto Sans JP',sans-serif;
  --hh:44px;--fh:44px;--th:22px; /* th = ticker height */
}
html,body{width:100%;height:100%;overflow:hidden;background:#F6F7F8 !important;}
body{
  background:#F6F7F8 !important;
  background-image:radial-gradient(circle,rgba(30,215,96,.35) 1.4px,transparent 1.4px) !important;
  background-size:22px 22px !important;
  font-family:var(--en);color:var(--ink);user-select:none;
  color-scheme:light;
}

/* TICKER */
.ticker-wrap{
  position:fixed;
  top:var(--hh);left:0;right:0;
  height:22px;
  background:#000;
  z-index:8999;
  overflow:hidden;
  display:none;
  align-items:center;
}
.ticker-inner{
  position:absolute;
  white-space:nowrap;
  font-family:var(--en);
  font-size:9px;
  font-weight:300;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:#fff;
  top:50%;
  transform-origin:left center;
  line-height:1;
}
/* PULL TO REFRESH */
#ptr-indicator{
  position:fixed;
  top:calc(var(--hh) + 22px);
  left:50%;
  transform:translateX(-50%) translateY(-60px);
  background:var(--accent);
  color:#fff;
  width:40px;height:40px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  z-index:8998;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s;
}

#loading-screen{
  position:fixed;inset:0;z-index:99999;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
  transition:opacity .6s ease;
}
#loading-screen.hide{opacity:0;pointer-events:none;}

#loading-video{
  width:min(96px, 18vw);
  height:auto;
  display:block;
  mix-blend-mode:screen;
}
#loading-text{
  font-family:var(--en);
  font-size:min(14px, 2.6vw);
  font-weight:300;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#fff;
  line-height:1;
  width:min(96px, 18vw); /* 動画と同じ幅 */
  text-align:center;
}

/* HEADER */
.site-header{
  position:fixed;top:0;left:0;right:0;height:var(--hh);
  background:var(--accent);z-index:9000;
  display:flex;align-items:center;padding:0 24px;justify-content:space-between;
}
.header-title{font-family:var(--jp);font-size:12px;font-weight:300;letter-spacing:.15em;color:#fff;cursor:pointer;}
.header-title span{font-family:var(--en);letter-spacing:.22em;font-weight:400;}
.header-nav{display:flex;gap:28px;}
.header-nav a{font-family:var(--en);font-size:10px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:#fff;text-decoration:none;opacity:.85;cursor:pointer;}
.header-nav a:hover{opacity:1;}

/* FOOTER */
.site-footer{
  position:fixed;bottom:0;left:0;right:0;height:var(--fh);
  background:var(--accent);z-index:9000;
  display:flex;align-items:center;padding:0 24px;justify-content:space-between;
}
.footer-copy{font-family:var(--en);font-size:9px;font-weight:300;letter-spacing:.15em;color:rgba(255,255,255,.75);text-transform:uppercase;}
.footer-shuffle{
  font-family:var(--en);font-size:9px;font-weight:300;letter-spacing:.2em;text-transform:uppercase;
  color:#fff;border:.5px solid rgba(255,255,255,.6);padding:7px 18px;cursor:pointer;background:none;
  flex-shrink:0;
}
.footer-shuffle:hover{background:rgba(255,255,255,.15);}

#shuffle-fab{display:none;}

@media(max-width:600px){
  .footer-shuffle{display:none;}
  #shuffle-fab{
    position:fixed;
    bottom:calc(var(--fh) * -0.3);
    right:12px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:var(--accent);
    border:none;
    cursor:pointer;
    z-index:9100;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
    box-shadow:none;
  }
  #shuffle-fab:active{background:var(--blue);}
  #shuffle-fab-inner{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    z-index:1;
  }
  #shuffle-fab-inner .fab-symbol{
    display:block;
    font-size:32px;
    color:#fff;
    line-height:1;
    font-weight:300;
  }
  #shuffle-fab-inner .fab-word{
    display:block;
    font-family:var(--en);
    font-size:10px;
    font-weight:500;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:#fff;
    line-height:1;
  }
}

/* ── WINDOW ── */
.win{
  position:fixed;
  background:var(--win);
  border:.5px solid var(--accent);
  z-index:10;
  cursor:grab;
  overflow:hidden;
}
.win:active{cursor:grabbing;}
.win.closed{display:none;}
.win.blue-win{border-color:var(--blue);}
.win.blue-win .win-bar{background:var(--blue);border-bottom-color:var(--blue);}
.win.blue-win .win-accent{background:var(--blue);}
.win.blue-win .win-close{border-color:#fff;color:#fff;background:transparent;}
.win.blue-win .win-close:hover{background:rgba(255,255,255,.25);}
.win.blue-win .work-cat{color:var(--blue);}
.win.blue-win .row{border-bottom-color:var(--blue);}
.win.blue-win .row.on .row-t{border-bottom-color:var(--blue);}

.win-accent{height:2px;background:var(--accent);}

.win-bar{
  padding:2px 6px;
  border-bottom:.5px solid var(--accent);
  background:var(--accent);
  display:flex;align-items:center;justify-content:space-between;
  cursor:grab;
  -webkit-user-select:none;user-select:none;
}
.win-bar:active{cursor:grabbing;}
.win-label{font-family:var(--en);font-size:8px;font-weight:300;letter-spacing:.22em;color:#fff;text-transform:uppercase;pointer-events:none;}
.win-close{
  /* タイトルバーと同じ高さ・同じ色の枠線 */
  width:14px;height:14px;
  border:.5px solid #fff;
  background:transparent;
  cursor:pointer;font-size:8px;color:#fff;
  display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;
}
.win-close:hover{background:rgba(255,255,255,.25);}
.win-body{padding:3px 4px;}

/* ABOUT MODAL */
.modal-overlay{position:fixed;inset:0;z-index:9500;background:rgba(26,26,26,.5);display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--win);border:.5px solid var(--accent);width:min(520px,90vw);max-height:82vh;overflow-y:auto;}
.modal-accent{height:2px;background:var(--accent);}
.modal-bar{padding:8px 14px;border-bottom:.5px solid var(--accent);background:var(--accent);display:flex;align-items:center;justify-content:space-between;}
.modal-lbl{font-family:var(--en);font-size:8px;font-weight:300;letter-spacing:.22em;color:#fff;text-transform:uppercase;}
.modal-x{width:18px;height:18px;border:.5px solid var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--accent);background:#fff;}
.modal-x:hover{background:var(--accent);color:#fff;}
.modal-body{padding:28px 30px;}
.about-name{font-family:var(--en);font-size:32px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;line-height:1;margin-bottom:4px;}
.about-sub{font-family:var(--jp);font-size:11px;font-weight:300;letter-spacing:.18em;color:var(--muted);margin-bottom:10px;}
.about-handle{display:inline-block;font-family:var(--en);font-size:8px;letter-spacing:.15em;text-transform:uppercase;background:var(--ink);color:var(--accent);padding:2px 9px;margin-bottom:18px;}
.about-bio{font-family:var(--jp);font-size:12px;font-weight:300;line-height:2.1;color:#444;margin-bottom:20px;}
.about-tags{display:flex;flex-wrap:wrap;gap:5px;}
.about-tag{font-family:var(--en);font-size:8px;letter-spacing:.12em;text-transform:uppercase;border:.5px solid var(--ink);padding:2px 9px;}

/* rows */
.row{display:flex;align-items:baseline;gap:12px;padding:9px 0;border-bottom:.5px solid var(--accent);font-family:var(--en);font-size:16px;font-weight:300;cursor:pointer;}
.row:last-of-type{border-bottom:none;}
.row:hover{opacity:.45;}
.row.on .row-t{border-bottom:2px solid var(--accent);}
.row-n{font-size:8px;color:var(--green);min-width:30px;flex-shrink:0;letter-spacing:.08em;}
.row-t{flex:1;}
.row-s{font-size:8px;color:var(--green);flex-shrink:0;}
.row-g{font-size:8px;color:var(--green);flex-shrink:0;margin-right:8px;}

/* player */
.player{margin-top:12px;border-top:.5px solid var(--accent);padding-top:12px;display:flex;align-items:center;gap:12px;}
.pbtn{width:28px;height:28px;border:.5px solid var(--accent);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.pbtn:hover{background:var(--accent);}
.pbtn svg{width:11px;height:11px;fill:var(--ink);display:block;}
.ptrack{flex:1;min-width:0;}
.pnow{font-family:var(--en);font-size:9px;color:var(--green);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pbar{height:1px;background:var(--dim);position:relative;}
.pfill{position:absolute;top:0;left:0;height:100%;background:var(--accent);}
.pdur{font-family:var(--en);font-size:9px;color:var(--green);flex-shrink:0;}

/* work card */
.img-ph{width:100%;aspect-ratio:3/2;background:#D8D8D8;display:flex;align-items:center;justify-content:center;font-family:var(--en);font-size:9px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.work-cat{font-family:var(--en);font-size:7px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:2px;margin-top:6px;}
.work-title{font-family:var(--jp);font-size:11px;font-weight:300;line-height:1.3;margin-bottom:3px;color:var(--blue);}
.work-date{font-family:var(--en);font-size:7px;color:var(--green);margin-bottom:6px;}

/* スマホ用スタイル */
@media(max-width:600px){
  .win-label{font-size:5px;}
  .work-cat{font-size:5px;}
  .work-title{
    font-size:7px;
    overflow:hidden;
    display:-webkit-box;
    -webkit-line-clamp:1;
    -webkit-box-orient:vertical;
    white-space:nowrap;
    text-overflow:ellipsis;
  }
  .work-date{font-size:5px;}
}

.loading{font-family:var(--en);font-size:8px;color:var(--muted);letter-spacing:.12em;padding:14px 0;text-align:center;}
</style>
</head>
<body>

<div class="ticker-wrap" id="ticker-wrap">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>
<div id="ptr-indicator">↯</div>

<div id="loading-screen">
  <video id="loading-video" autoplay muted playsinline loop>
    <source src="paik-08_1.mp4" type="video/mp4">
  </video>
  <div id="loading-text">Loading...</div>
</div>

<header class="site-header">
  <span class="header-title" onclick="openAbout()">シマブク / <span>PAIK</span></span>
  <nav class="header-nav">
    <a onclick="openAbout()">About</a>
    <a onclick="revealWorks()">Works</a>
    <a id="contact-link" href="https://instagram.com/" target="_blank">Contact</a>
  </nav>
</header>

<!-- ABOUT MODAL -->
<div class="modal-overlay" id="about-modal" onclick="if(event.target===this)closeAbout()">
  <div class="modal">
    <div class="modal-accent"></div>
    <div class="modal-bar"><span class="modal-lbl">About</span><span class="modal-x" onclick="closeAbout()">×</span></div>
    <div class="modal-body" id="about-body"><div class="loading">Loading...</div></div>
  </div>
</div>

<!-- WORKS -->
<div id="works-container"></div>

<footer class="site-footer">
  <span class="footer-copy" id="footer-copy">© 2025 Shimabuku / PAIK</span>
  <button class="footer-shuffle" onclick="doShuffle()">↯ Shuffle</button>
</footer>

<!-- スマホ用 丸SHUFFLEボタン -->
<button id="shuffle-fab" onclick="doShuffle()">
  <div id="shuffle-fab-inner">
    <span class="fab-symbol">↯</span>
    <span class="fab-word">Shuffle</span>
  </div>
</button>

<script>
const SHEETS = {
  about:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=1400416584&single=true&output=csv',
  works:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=2026004957&single=true&output=csv',
  podcast: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=266309937&single=true&output=csv',
  music:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=402396762&single=true&output=csv',
  contact: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8G17QvAmRLCbaGbIXpv4WRajE--KIln_XC5L7XIcbgyp9qGDucOsSFCiRcVwRvaQugIUczx3IM9Cu/pub?gid=789321669&single=true&output=csv',
};

const HH=44, FH=44;
let zTop=100;
let allIds=[];
// 各ウィンドウの基準幅を記録（shuffle用）
const baseWidths={};

function cx(x,w){return Math.max(0,Math.min(x,window.innerWidth-(w||0)-2));}
function cy(y,h){
  const tickerH=document.getElementById('ticker-wrap')?.style.display!=='none'?22:0;
  return Math.max(HH+tickerH,Math.min(y,window.innerHeight-FH-32));
}

function bringTop(id){
  const el=document.getElementById(id);
  if(el){zTop++;el.style.zIndex=zTop;}
}
function closeWin(id){document.getElementById(id)?.classList.add('closed');}
function openWin(id){document.getElementById(id)?.classList.remove('closed');}

// ── ウィンドウ全体でドラッグ ──
let dragEl=null, ox=0, oy=0;
let touchEl=null, ttx=0, tty=0;
let dragMoved=false; // ドラッグ判定（クリックと区別）

function placeWin(id,x,y,w,h){
  const el=document.getElementById(id);
  if(!el) return;
  if(w){el.style.width=w+'px'; baseWidths[id]=w;}
  if(h) el.style.height=h+'px';

  // ウィンドウ全体mousedown→ドラッグ
  el.addEventListener('mousedown', e=>{
    // ×ボタンは除外
    if(e.target.classList.contains('win-close')) return;
    bringTop(id);
    dragEl=el; dragMoved=false;
    const r=el.getBoundingClientRect();
    ox=e.clientX-r.left; oy=e.clientY-r.top;
    e.preventDefault();
  });
  // タッチ
  el.addEventListener('touchstart', e=>{
    if(e.target.classList.contains('win-close')) return;
    bringTop(id);
    touchEl=el; dragMoved=false;
    const t=e.touches[0];
    const r=el.getBoundingClientRect();
    ttx=t.clientX-r.left; tty=t.clientY-r.top;
  },{passive:true});

  setTimeout(()=>{
    el.style.left=cx(x,el.offsetWidth||w||300)+'px';
    el.style.top=cy(y,el.offsetHeight||h||200)+'px';
  },0);
  if(!allIds.includes(id)) allIds.push(id);
}

document.addEventListener('mousemove', e=>{
  if(!dragEl) return;
  dragMoved=true;
  dragEl.style.left=cx(e.clientX-ox,dragEl.offsetWidth)+'px';
  dragEl.style.top=cy(e.clientY-oy,dragEl.offsetHeight)+'px';
});
document.addEventListener('mouseup',()=>{dragEl=null;});

document.addEventListener('touchmove', e=>{
  if(!touchEl) return;
  dragMoved=true;
  const t=e.touches[0];
  touchEl.style.left=cx(t.clientX-ttx,touchEl.offsetWidth)+'px';
  touchEl.style.top=cy(t.clientY-tty,touchEl.offsetHeight)+'px';
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',()=>{touchEl=null;});

// ── SHUFFLE: 位置・サイズ・z-index をランダムに ──
function doShuffle(){
  // 振動: 40ms × 3回、間隔30ms
  if(navigator.vibrate) navigator.vibrate([40,30,40,30,40]);
  const vw=window.innerWidth, vh=window.innerHeight;
  allIds.forEach(id=>{
    openWin(id);
    const el=document.getElementById(id);
    if(!el) return;

    // サイズ: スマホは0.6×/0.8×/1×、PCは1×/0.5×/0.3×
    const isMob=window.innerWidth<=600;
    const bw=baseWidths[id]||Math.round(vw*0.5);
    const scales=isMob?[0.8,1,1.4]:[1,0.5,0.3];
    const scale=scales[Math.floor(Math.random()*scales.length)];
    const newW=Math.round(Math.min(bw*scale, vw*0.92));
    el.style.width=newW+'px';

    // 位置: 画面内ランダム
    const eh=el.offsetHeight||200;
    el.style.left=cx(Math.random()*(vw-newW), newW)+'px';
    el.style.top=cy(HH+Math.random()*(vh-HH-FH-eh), eh)+'px';
  });

  // z-index シャッフル
  const zs=allIds.map(id=>parseInt(document.getElementById(id)?.style.zIndex||10));
  for(let i=zs.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [zs[i],zs[j]]=[zs[j],zs[i]];
  }
  allIds.forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el) el.style.zIndex=zs[i];
  });
}

// ── LAYOUT ──
function layoutAll(){
  // podcast/musicウィンドウは削除済み。worksのみ使用。
}

// ── WORKS ──
function buildWorkWins(works){
  const container=document.getElementById('works-container');
  container.innerHTML='';
  const vw=window.innerWidth, vh=window.innerHeight, avail=vh-HH-FH;
  const wwBase=Math.round(vw*0.50);
  // スマホ(600px以下)とPCでサイズパターンを変える（案B）
  const isMobile=vw<=600;
  const initScales=isMobile?[0.8,1,1.4]:[0.3,0.5,1];
  const col0=Math.round(vw*0.03), col1=Math.round(vw*0.40);

  works.forEach((w,i)=>{
    const id=`w-work-${i}`;
    const el=document.createElement('div');
    el.className='win';
    el.id=id;

    // たまに濃い青ウィンドウ（約25%の確率）
    const isBlue=Math.random()<0.25;
    if(isBlue) el.classList.add('blue-win');
    const winColor=isBlue?'var(--blue)':'var(--accent)';

    const norm=url=>{
      if(!url) return '';
      if(url.includes('github.com')&&url.includes('/blob/'))
        return url.replace('github.com','raw.githubusercontent.com').replace('/blob/','/');
      return url;
    };
    const imgUrl  =norm(w.image_url||'');
    const linkUrl =norm(w.url||'');
    const embedUrl=norm(w.embed_url||'');

    const isYT=embedUrl&&(embedUrl.includes('youtube.com/embed')||embedUrl.includes('youtu.be'));
    const isSpotifyEmbed=embedUrl&&embedUrl.includes('spotify.com/embed');
    const isImg=url=>url&&(
      url.match(/\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i)||
      url.includes('raw.githubusercontent.com')||
      url.startsWith('/')||
      url.includes('drive.google.com/uc')||
      url.includes('googleusercontent.com')
    );

    // メディア部分
    let mediaHTML='';
    if(isYT){
      mediaHTML=`<div style="position:relative;width:100%;padding-top:56.25%;background:#000;">
        <iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>
      </div>`;
    } else if(isSpotifyEmbed){
      // Spotify埋め込み: ウィンドウ幅を固定、余白なし
      setTimeout(()=>{
        const winEl=document.getElementById(id);
        if(winEl) winEl.style.width='320px';
      },0);
      mediaHTML=`<iframe src="${embedUrl}" width="320" height="152" frameborder="0" allowfullscreen allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy" style="display:block;border:none;"></iframe>`;
    } else {
      const imgSrc=isImg(imgUrl)?imgUrl:isImg(linkUrl)?linkUrl:'';
      if(imgSrc){
        // 最前面のウィンドウのみリンク遷移、それ以外は前に持ってくるだけ
        const clickHandler=linkUrl&&!isImg(linkUrl)
          ? `onclick="handleImgClick(event,'${id}','${linkUrl}')"`
          : '';
        mediaHTML=`<img src="${imgSrc}" ${clickHandler} style="display:block;width:100%;height:auto;cursor:pointer;" alt="${w.title||''}">`;
      } else {
        mediaHTML=`<div class="img-ph">Image</div>`;
      }
    }

    // リンクボタン（画像でない場合）
    let linkHTML='';
    if(linkUrl&&!isImg(linkUrl)){
      const isSp=linkUrl.includes('spotify.com');
      const isYTLink=linkUrl.includes('youtube.com')||linkUrl.includes('youtu.be');
      const btnStyle=`display:inline-flex;align-items:center;gap:6px;font-family:var(--en);font-size:8px;letter-spacing:.1em;text-transform:uppercase;border:.5px solid ${winColor};padding:4px 12px;color:var(--ink);text-decoration:none;margin-top:8px;`;
      if(isSp){
        linkHTML=`<a href="${linkUrl}" target="_blank" style="${btnStyle}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          Spotify</a>`;
      } else if(isYTLink){
        linkHTML=`<a href="${linkUrl}" target="_blank" style="${btnStyle}">YouTube →</a>`;
      } else {
        linkHTML=`<a href="${linkUrl}" target="_blank" style="${btnStyle}">Open →</a>`;
      }
    }

    el.innerHTML=`
      <div class="win-accent"></div>
      <div class="win-bar">
        <span class="win-label">${w.category||'Work'} / ${w.date||''}</span>
        <button class="win-close" onclick="closeWin('${id}')">×</button>
      </div>
      ${mediaHTML}
      <div class="win-body" style="padding:${isSpotifyEmbed?'0':'2px 4px 4px'};">${isSpotifyEmbed?'':` `}
        <div class="work-cat">${w.category||''}</div>
        <div class="work-title">${w.title||''}</div>
        <div class="work-date">${w.date||''}</div>
        ${linkHTML}
      </div>`;
    container.appendChild(el);

    // 新しい順（行番号が大きい=後に追加）が最上位
    const baseZ = 100 + i;
    el.style.zIndex=baseZ;

    const isLeft=i%2===0;
    const jx=(Math.random()-.5)*Math.round(vw*0.04);
    const jy=(Math.random()-.5)*Math.round((vh-HH-FH)*0.04);
    const x=(isLeft?col0:col1)+jx;
    const y=Math.round(HH+(vh-HH-FH)*0.10+Math.floor(i/2)*Math.round((vh-HH-FH)*0.06))+jy;

    const initScale=initScales[Math.floor(Math.random()*initScales.length)];
    const ww=Math.round(wwBase*initScale);

    placeWin(id,x,y,ww,0);
    el.style.zIndex=baseZ;
  });
}

// 最前面のウィンドウIDを返す
function getTopWinId(){
  let maxZ=-1, topId=null;
  allIds.forEach(id=>{
    const el=document.getElementById(id);
    if(!el||el.classList.contains('closed')) return;
    const z=parseInt(el.style.zIndex||0);
    if(z>maxZ){maxZ=z;topId=id;}
  });
  return topId;
}

// ── CSV ──
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(let c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=c;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}
async function fetchSheet(key){
  const url=SHEETS[key];
  if(!url||url.startsWith('YOUR_')) return null;
  try{const r=await fetch(url);return parseCSV(await r.text());}
  catch(e){return null;}
}

// ── WORKS ──
async function loadWorks(){
  const data=await fetchSheet('works');
  const works=data||[
    {category:'CDアートワーク',title:'convex mirror e.p.',url:'',date:'2024'},
    {category:'YouTube',title:'Sample',url:'',embed_url:'',date:'2025'},
  ];
  buildWorkWins(works);

  // ティッカー: 最新1件を複数並べて流す
  if(works.length>0){
    const latest=works[works.length-1];
    const cat=latest.category||'';
    const title=latest.title||'新しい投稿';
    const msg=cat ? `${cat}「${title}」を更新しました！` : `「${title}」を更新しました！`;
    const el=document.getElementById('ticker-inner');
    el.textContent=msg;
    const wrap=document.getElementById('ticker-wrap');
    wrap.style.display='flex';

    // テキスト幅確定後にJS開始
    requestAnimationFrame(()=>{
      const tw=el.offsetWidth;
      const gap=200; // テキスト間の間隔(px)
      const interval=tw+gap; // 1サイクルの幅

      // テキストを複数並べる（画面幅 + 余裕分）
      const vw=window.innerWidth;
      const count=Math.ceil((vw+interval*2)/interval)+1;
      el.textContent='';
      const spans=[];
      for(let i=0;i<count;i++){
        const s=document.createElement('span');
        s.textContent=msg;
        s.style.cssText=`position:absolute;white-space:nowrap;top:50%;transform-origin:left center;`;
        el.appendChild(s);
        spans.push(s);
      }

      // 初期位置: 右端から順番に並べる
      spans.forEach((s,i)=>{
        s.style.transform=`translateX(${vw + i*interval}px) translateY(-50%)`;
      });

      const speed=0.8;
      const positions=spans.map((_,i)=>vw+i*interval);

      function tickerStep(){
        positions.forEach((x,i)=>{
          positions[i]=x-speed;
          // 画面左端+テキスト幅を超えたら右端に回す
          if(positions[i]<-(tw+gap)){
            positions[i]=positions[i]+count*interval;
          }
        spans[i].style.transform=`translateX(${positions[i]}px) translateY(-50%)`;
        });
        requestAnimationFrame(tickerStep);
      }
      requestAnimationFrame(tickerStep);
    });
  }
}

// ── PLAY/PAUSE ──
const timers={};
function togglePlay(btn,fillId){
  const on=btn.dataset.on==='1';
  if(on){
    btn.dataset.on='0';
    btn.querySelector('svg').innerHTML='<path d="M8 5v14l11-7z"/>';
    clearInterval(timers[fillId]);
  }else{
    btn.dataset.on='1';
    btn.querySelector('svg').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    const fill=document.getElementById(fillId);
    let w=parseFloat(fill.style.width)||0;
    timers[fillId]=setInterval(()=>{w=(w+.05)%100;fill.style.width=w+'%';},80);
  }
}

// ── PULL TO REFRESH ──
(()=>{
  const PTR_THRESHOLD = 80; // 引っ張る距離(px)
  let startY = 0, pulling = false;
  const indicator = document.getElementById('ptr-indicator');

  document.addEventListener('touchstart', e=>{
    // 一番上にいるときだけ有効
    if(window.scrollY === 0){
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, {passive:true});

  document.addEventListener('touchmove', e=>{
    if(!pulling) return;
    const dist = e.touches[0].clientY - startY;
    if(dist > 0 && dist < PTR_THRESHOLD * 1.5){
      const ratio = Math.min(dist / PTR_THRESHOLD, 1);
      indicator.style.opacity = ratio;
      indicator.style.transform = `translateX(-50%) translateY(${-60 + dist * 0.6}px) rotate(${dist * 2}deg)`;
    }
  }, {passive:true});

  document.addEventListener('touchend', e=>{
    if(!pulling) return;
    const dist = e.changedTouches[0].clientY - startY;
    if(dist >= PTR_THRESHOLD){
      // しきい値超えたらリロード
      indicator.style.opacity = '1';
      indicator.style.transform = 'translateX(-50%) translateY(10px) rotate(720deg)';
      indicator.style.transition = 'transform .4s ease, opacity .4s ease';
      setTimeout(()=> location.reload(), 400);
    } else {
      // 戻す
      indicator.style.opacity = '0';
      indicator.style.transform = 'translateX(-50%) translateY(-60px)';
    }
    pulling = false;
  }, {passive:true});
})();

  // ローディングは最大2秒で必ず消す（データ取得と切り離す）
  const hideLoading=()=>{
    const ls=document.getElementById('loading-screen');
    if(!ls||ls.style.display==='none') return;
    ls.classList.add('hide');
    setTimeout(()=>ls.style.display='none',600);
  };
  setTimeout(hideLoading, 2000); // 最大2秒

  // データ取得（失敗しても画面は消える）
  try{
    await Promise.all([loadAbout(),loadContact()]);
    await loadWorks();
  }catch(e){
    console.warn('load error',e);
  }

  // データ取得完了後0.8秒で消す（2秒より早く終わった場合）
  setTimeout(hideLoading, 800);
});
